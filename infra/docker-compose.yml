services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mirror-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-9999}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mirror}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mirror_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-mirror_tutor}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro
      - ./db/002_v1_1_household_schema.sql:/docker-entrypoint-initdb.d/002_v1_1_household_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mirror}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
